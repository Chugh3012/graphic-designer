services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://payload:payload_dev@postgres:5432/graphic_designer
      PAYLOAD_SECRET: devcontainer-secret-change-in-production
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: graphic_designer
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d graphic_designer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
