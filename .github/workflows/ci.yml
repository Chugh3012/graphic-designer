name: CI

# Deliberately lean to conserve Actions minutes (private repo = every minute is
# billed). Two jobs, each with a single `npm ci` (was nine jobs / eight installs
# and Next.js rebuilt 3-4x per run). The Docker image build + Trivy scan live in
# the deploy workflow, which already builds the image — rebuilding it on every PR
# push was pure waste. Docs-only changes skip CI entirely.

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'pdf-output/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URI: file:./portfolio.db
  PAYLOAD_SECRET: ci-test-secret-not-for-production-use-only
  NEXT_PUBLIC_SITE_URL: http://localhost:3000

jobs:
  checks:
    name: Lint · types · unit · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test:unit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - name: Upload report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
