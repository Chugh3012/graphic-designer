name: CI

# Lean PR gate (billed minutes). One job: lint, types, unit tests, security
# audit. The full build + deploy live in deploy.yml. Docs-only changes skip CI.
# E2E is run ad hoc when a change warrants it.

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'pdf-output/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SITE_URL: http://localhost:3000

jobs:
  checks:
    name: Lint · types · unit · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit
