name: Deploy to Production

# Builds the image, pushes it to the GitHub Container Registry (ghcr.io — free),
# then rolls it onto the Azure Container App. Auth is passwordless: GITHUB_TOKEN
# for ghcr.io and GitHub OIDC for Azure. Schema is auto-synced on boot (SQLite),
# so there is no separate migration step. Assumes infrastructure already exists
# (see infra.yml).

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
  APP_BASE: graphic-designer-production

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ghcr.io requires a lowercase repository path; the owner login can be mixed-case.
      - name: Resolve image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/graphic-designer" >> "$GITHUB_ENV"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      # CVE gate before rollout. Scans for vulnerabilities only — the secret
      # scanner false-positives on the Azure SDK's bundled public emulator
      # constant (devstoreaccount1). Fails the deploy on CRITICAL/HIGH.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          scanners: vuln

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Roll out new image
        run: |
          az containerapp update \
            -g "$RG" -n "${APP_BASE}-app" \
            --image "${{ env.IMAGE }}:${{ github.sha }}"

      - name: Smoke test /healthz
        run: |
          FQDN=$(az containerapp show -g "$RG" -n "${APP_BASE}-app" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Testing https://$FQDN/healthz"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/healthz" || echo 000)
            if [ "$CODE" = "200" ]; then echo "✅ Healthy"; exit 0; fi
            echo "Attempt $i: $CODE — retrying"; sleep 10
          done
          echo "❌ Health check failed"; exit 1
