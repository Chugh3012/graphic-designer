name: Deploy to Production

on:
  push:
    branches:
      - master  # Changed from 'main' to match default branch

# Prevent concurrent deployments
concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_REPOSITORY: graphic-designer
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npx tsc --noEmit

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Azure credentials
        id: check-secrets
        run: |
          if [ -z "${{ secrets.ACR_REGISTRY }}" ] || [ -z "${{ secrets.ACR_USERNAME }}" ] || [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "❌ Azure Container Registry secrets are not configured"
            echo "Please configure the following secrets in repository settings:"
            echo "  - ACR_REGISTRY"
            echo "  - ACR_USERNAME"
            echo "  - ACR_PASSWORD"
            echo "  - AZURE_CREDENTIALS"
            echo "  - AZURE_APP_SERVICE_NAME"
            echo ""
            echo "See CI-STATUS.md for more information"
            echo "secrets_configured=false" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "✅ Azure credentials are configured"
            echo "secrets_configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Login to Azure Container Registry
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:latest

      - name: Login to Azure
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Wait for deployment to stabilize
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: sleep 30

      - name: Deployment smoke test
        if: steps.check-secrets.outputs.secrets_configured == 'true'
        run: |
          APP_URL="https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net"
          echo "Testing deployment at: $APP_URL"
          
          # Check if the app responds with 200 OK
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
          
          if [ "$STATUS_CODE" = "200" ]; then
            echo "✅ Deployment successful! App is responding with 200 OK"
          elif [ "$STATUS_CODE" = "000" ]; then
            echo "❌ Deployment failed! Could not connect to $APP_URL"
            exit 1
          else
            echo "⚠️ Deployment may have issues. Got status code: $STATUS_CODE"
            exit 1
          fi
          
          # Optional: Check for specific content
          RESPONSE=$(curl -s "$APP_URL")
          if echo "$RESPONSE" | grep -q "graphic-designer\|portfolio"; then
            echo "✅ Content verification passed"
          else
            echo "⚠️ Warning: Expected content not found in response"
          fi
