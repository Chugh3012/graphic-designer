version: 2

# Weekly updates, with every ecosystem grouped into a SINGLE pull request so
# each ecosystem costs at most one CI run per week (not one per dependency).
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
    groups:
      npm:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore(ci)
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore(docker)
    groups:
      docker:
        patterns: ["*"]
